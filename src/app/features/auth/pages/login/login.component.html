<div class="login-page d-flex align-items-center justify-content-center">
  <!-- Background Glow Effects -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5 col-xl-4">
        
        <!-- Glassmorphism Card -->
        <div class="glass-card p-4 p-md-5">
          
          <!-- Header -->
          <div class="text-center mb-5">
            <h1 class="brand-title mb-2">TaskOrbit</h1>
            <p class="text-muted-light subtitle">Acceso al sistema</p>
          </div>
          
          <!-- Error Alert -->
          <div *ngIf="errorMessage()" class="alert alert-danger-glass mb-4 fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            {{ errorMessage() }}
          </div>
          
          <!-- Login Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <!-- Username Input -->
            <div class="mb-4 input-group-glass">
              <label for="username" class="form-label visually-hidden">Usuario</label>
              <div class="input-wrapper">
                <i class="bi bi-person input-icon"></i>
                <input 
                  type="text" 
                  class="form-control glass-input" 
                  id="username" 
                  placeholder="Usuario"
                  formControlName="username"
                  [class.is-invalid]="f.username.invalid && (f.username.dirty || f.username.touched)"
                  autocomplete="username">
              </div>
              <div *ngIf="f.username.invalid && (f.username.dirty || f.username.touched)" class="invalid-feedback d-block mt-1 small">
                <span *ngIf="f.username.errors?.['required']">El usuario es requerido</span>
              </div>
            </div>
            
            <!-- Password Input -->
            <div class="mb-4 input-group-glass">
              <label for="password" class="form-label visually-hidden">Contraseña</label>
              <div class="input-wrapper">
                <i class="bi bi-lock input-icon"></i>
                <input 
                  type="password" 
                  class="form-control glass-input" 
                  id="password" 
                  placeholder="Contraseña"
                  formControlName="password"
                  [class.is-invalid]="f.password.invalid && (f.password.dirty || f.password.touched)"
                  autocomplete="current-password">
              </div>
              <div *ngIf="f.password.invalid && (f.password.dirty || f.password.touched)" class="invalid-feedback d-block mt-1 small">
                <span *ngIf="f.password.errors?.['required']">La contraseña es requerida</span>
                <span *ngIf="f.password.errors?.['minlength']">Mínimo 6 caracteres</span>
              </div>
            </div>
            
            <!-- Submit Button -->
            <div class="d-grid mt-5">
              <button 
                type="submit" 
                class="btn btn-primary-neon btn-lg" 
                [disabled]="loginForm.invalid || isLoading()">
                
                <span *ngIf="!isLoading()">INICIAR SESIÓN</span>
                
                <div *ngIf="isLoading()" class="d-flex align-items-center justify-content-center">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  <span>Verificando...</span>
                </div>
              </button>
            </div>
            
          </form>
          
          <!-- Footer Text -->
          <div class="text-center mt-4">
            <p class="small text-muted-dark mb-0">© 2026 TaskOrbit Lucio</p>
          </div>
          
        </div>
      </div>
    </div>
  </div>
</div>
